<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VoyageAI - Авторизация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: #05050a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .logo {
            width: 100px; height: 100px;
            background: linear-gradient(45deg, #00f2ff, #bc13fe);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .title {
            font-size: 24px; font-weight: bold;
            letter-spacing: 5px; text-transform: uppercase;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00f2ff, #fff, #bc13fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            font-size: 14px; opacity: 0.6;
            letter-spacing: 2px;
        }
        .loader {
            width: 200px; height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 40px;
            position: relative; overflow: hidden;
        }
        .loader-bar {
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: #00f2ff;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="logo"></div>
    <div class="title">VoyageAI</div>
    <div class="status" id="status">АВТОРИЗАЦИЯ...</div>
    <div class="loader">
        <div class="loader-bar"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        setTimeout(() => {
            document.getElementById('status').innerText = "СОЕДИНЕНИЕ УСТАНОВЛЕНО";
            setTimeout(() => {
                // Redirect to the main page or bonus page
                // Since this is usually opened via specific buttons,
                // index.html can just be a generic entry point.
                window.location.href = "wheel.html" + window.location.search;
            }, 500);
        }, 1500);
    </script>
</body>
</html>
