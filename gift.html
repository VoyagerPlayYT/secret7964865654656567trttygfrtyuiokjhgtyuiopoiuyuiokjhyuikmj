<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VoyageAI - GIFT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; font-family: 'Segoe UI', sans-serif; color: #fff; }
        #stars-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .scene { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none !important; }

        /* Кнопка */
        .btn-launch {
            padding: 20px 50px; font-size: 24px; font-weight: bold; color: #000; background: #ffd700;
            border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 30px #ffd700;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-launch:active { transform: scale(0.9); }

        /* Ракета (SVG) */
        #rocket-wrapper {
            position: absolute; bottom: -200px; width: 80px; height: 120px; z-index: 20;
            transition: transform 2s cubic-bezier(0.6, 0, 0.4, 1);
        }
        .rocket-svg { width: 100%; height: 100%; filter: drop-shadow(0 0 20px #ff4500); }

        /* Цель */
        #star-target {
            width: 150px; height: 150px; background: radial-gradient(circle, #fff, #ffd700, transparent);
            border-radius: 50%; box-shadow: 0 0 80px #ffd700; position: absolute; top: 15%;
            animation: pulseStar 1.5s infinite alternate; display: none;
        }
        @keyframes pulseStar { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.15); opacity: 1; } }

        /* Приз */
        .win-view { text-align: center; animation: zoomIn 0.5s ease-out; }
        .win-title { font-size: 50px; font-weight: 900; color: #ffd700; text-shadow: 0 0 30px #ff8c00; }
        .win-sub { font-size: 20px; margin-top: 10px; opacity: 0.8; }
        @keyframes zoomIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 100; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="stars-container"></div>
    <div id="flash-overlay" class="flash"></div>

    <!-- Шаг 1 -->
    <div id="scene-start" class="scene">
        <h1 style="margin-bottom: 30px; letter-spacing: 2px;">ВАШ ПОДАРОК 🌌</h1>
        <button class="btn-launch" onclick="launch()">ЗАПУСК 🚀</button>
    </div>

    <!-- Шаг 2 -->
    <div id="scene-flight" class="scene hidden">
        <div id="star-target"></div>
        <div id="rocket-wrapper">
            <!-- SVG Ракеты -->
            <svg class="rocket-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L8 10V18C8 19.1 8.9 20 10 20H14C15.1 20 16 19.1 16 18V10L12 2Z" fill="#fff"/>
                <path d="M12 2L10 10H14L12 2Z" fill="#ff4500"/>
                <path d="M8 14L5 18H11L8 14Z" fill="#ff4500"/>
                <path d="M16 14L19 18H13L16 14Z" fill="#ff4500"/>
                <circle cx="12" cy="14" r="2" fill="#000055"/>
            </svg>
        </div>
    </div>

    <!-- Шаг 3 -->
    <div id="scene-win" class="scene hidden">
        <div class="win-view">
            <div class="win-title">+1500 ⚡</div>
            <div class="win-sub">РАНГ <b>NEBULA</b> АКТИВИРОВАН</div>
            <button class="btn-launch" style="margin-top: 50px; background: #fff;" onclick="closeApp()">ЗАБРАТЬ 🎁</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Простой фон со звездами
        const container = document.getElementById('stars-container');
        for(let i=0; i<100; i++) {
            const s = document.createElement('div');
            s.style.position = 'absolute';
            s.style.left = Math.random()*100 + '%';
            s.style.top = Math.random()*100 + '%';
            s.style.width = Math.random()*3 + 'px';
            s.style.height = s.style.width;
            s.style.background = '#fff';
            s.style.borderRadius = '50%';
            s.style.opacity = Math.random();
            container.appendChild(s);
        }

        function launch() {
            document.getElementById('scene-start').classList.add('hidden');
            document.getElementById('scene-flight').classList.remove('hidden');
            document.getElementById('star-target').style.display = 'block';
            
            const rocket = document.getElementById('rocket-wrapper');
            rocket.style.bottom = '-100px';
            
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                rocket.style.transform = 'translateY(-70vh) scale(0.3)';
            }, 100);

            setTimeout(() => {
                // Вспышка
                const flash = document.getElementById('flash-overlay');
                flash.style.opacity = '1';
                tg.HapticFeedback.notificationOccurred('success');
                
                setTimeout(() => {
                    flash.style.opacity = '0';
                    document.getElementById('scene-flight').classList.add('hidden');
                    document.getElementById('scene-win').classList.remove('hidden');
                }, 150);
            }, 1800);
        }

        function closeApp() {
            tg.sendData("REWARD_GALACTIC_2026");
            tg.close();
        }
    </script>
</body>
</html>
