<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VoyageAI - GALACTIC GIFT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; background: #000;
            overflow: hidden; height: 100vh;
            font-family: 'Segoe UI', sans-serif; color: #fff;
        }

        /* Фоновая анимация звезд */
        #universe {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }
        .star {
            position: absolute; background: #fff;
            border-radius: 50%; animation: twinkle var(--duration) ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Планеты на фоне */
        .planet {
            position: absolute; border-radius: 50%;
            animation: float 20s ease-in-out infinite;
        }
        .planet-1 {
            width: 100px; height: 100px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c92a2a);
            top: 10%; right: 10%;
            box-shadow: 0 0 60px rgba(255, 107, 107, 0.4);
        }
        .planet-2 {
            width: 60px; height: 60px;
            background: radial-gradient(circle at 30% 30%, #4ecdc4, #087f5b);
            bottom: 20%; left: 5%;
            box-shadow: 0 0 40px rgba(78, 205, 196, 0.4);
            animation-delay: -5s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Сцены */
        .scene {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; transition: opacity 0.5s;
        }
        .hidden { opacity: 0; pointer-events: none; }

        /* Заголовок */
        .title {
            font-size: 36px; font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(45deg, #ffd700, #ff6b6b, #4ecdc4, #ffd700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.5);
            margin-bottom: 20px;
        }
        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 16px; opacity: 0.7;
            margin-bottom: 50px; letter-spacing: 2px;
        }

        /* Кнопка запуска */
        .btn-launch {
            padding: 25px 60px; font-size: 22px;
            font-weight: bold; color: #000;
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            border: none; border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.5),
                        0 0 60px rgba(255, 140, 0, 0.3),
                        inset 0 -5px 20px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative; overflow: hidden;
        }
        .btn-launch::before {
            content: ''; position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        .btn-launch:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 50px rgba(255, 215, 0, 0.7),
                        0 0 80px rgba(255, 140, 0, 0.5);
        }
        .btn-launch:active {
            transform: scale(0.95);
        }

        /* Ракета 2D */
        #rocket-container {
            position: absolute;
            bottom: -200px; left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }
        .rocket {
            width: 80px; height: 160px;
            position: relative;
            animation: wobble 0.2s ease-in-out infinite;
        }
        @keyframes wobble {
            0%, 100% { transform: rotate(-1deg); }
            50% { transform: rotate(1deg); }
        }

        /* Корпус ракеты */
        .rocket-body {
            width: 60px; height: 120px;
            background: linear-gradient(90deg, #e0e0e0 0%, #fff 50%, #c0c0c0 100%);
            border-radius: 30px 30px 10px 10px;
            position: absolute; top: 0; left: 10px;
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.1),
                        0 0 20px rgba(255,255,255,0.3);
        }
        /* Нос ракеты */
        .rocket-nose {
            width: 60px; height: 50px;
            background: linear-gradient(90deg, #ff4444 0%, #ff6666 50%, #cc0000 100%);
            border-radius: 30px 30px 0 0;
            position: absolute; top: -40px; left: 10px;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }
        /* Иллюминатор */
        .rocket-window {
            width: 30px; height: 30px;
            background: radial-gradient(circle at 30% 30%, #87CEEB, #1e3a5f);
            border: 3px solid #666;
            border-radius: 50%;
            position: absolute; top: 30px; left: 25px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5),
                        0 0 10px rgba(135, 206, 235, 0.5);
        }
        /* Крылья */
        .rocket-fin-left, .rocket-fin-right {
            width: 0; height: 0;
            border-style: solid;
            position: absolute; bottom: 20px;
        }
        .rocket-fin-left {
            border-width: 0 25px 50px 0;
            border-color: transparent #ff4444 transparent transparent;
            left: -15px;
        }
        .rocket-fin-right {
            border-width: 50px 25px 0 0;
            border-color: #ff4444 transparent transparent transparent;
            right: -15px;
        }

        /* Пламя */
        .flame {
            position: absolute; bottom: -40px; left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 60px;
            background: linear-gradient(to bottom, #fff 0%, #ffd700 20%, #ff8c00 50%, #ff4444 80%, transparent 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flame 0.1s ease-in-out infinite alternate;
            filter: blur(2px);
        }
        @keyframes flame {
            0% { transform: translateX(-50%) scaleY(1) scaleX(1); }
            100% { transform: translateX(-50%) scaleY(1.3) scaleX(0.8); }
        }
        .flame-inner {
            position: absolute; bottom: -25px; left: 50%;
            transform: translateX(-50%);
            width: 20px; height: 40px;
            background: linear-gradient(to bottom, #fff, #87CEEB, transparent);
            border-radius: 50%;
            animation: flame-inner 0.1s ease-in-out infinite alternate;
            filter: blur(1px);
        }
        @keyframes flame-inner {
            0% { transform: translateX(-50%) scaleY(1); opacity: 0.8; }
            100% { transform: translateX(-50%) scaleY(1.2); opacity: 1; }
        }

        /* Частицы огня */
        .spark {
            position: absolute; background: #ff8c00;
            border-radius: 50%; pointer-events: none;
            animation: spark-fly 0.5s ease-out forwards;
        }
        @keyframes spark-fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Дым */
        .smoke {
            position: absolute; background: radial-gradient(circle, rgba(200,200,200,0.3), transparent);
            border-radius: 50%; pointer-events: none;
            animation: smoke-rise 2s ease-out forwards;
        }
        @keyframes smoke-rise {
            0% { transform: translateY(0) scale(1); opacity: 0.5; }
            100% { transform: translateY(100px) scale(3); opacity: 0; }
        }

        /* Цель - Звезда */
        #star-target {
            width: 200px; height: 200px;
            position: absolute; top: 10%; left: 50%;
            transform: translateX(-50%);
            display: none;
        }
        .star-glow {
            width: 100%; height: 100%;
            background: radial-gradient(circle, #fff 0%, #ffd700 30%, #ff8c00 60%, transparent 70%);
            border-radius: 50%;
            animation: star-pulse 1s ease-in-out infinite alternate;
            box-shadow: 0 0 100px #ffd700, 0 0 200px #ff8c00;
        }
        @keyframes star-pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.2); opacity: 1; }
        }
        .star-rays {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300%; height: 300%;
            background: conic-gradient(from 0deg, transparent, rgba(255,215,0,0.3), transparent, rgba(255,215,0,0.3), transparent);
            animation: rotate 4s linear infinite;
        }
        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Экран победы */
        .win-container {
            text-align: center;
            animation: win-appear 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            opacity: 0; transform: scale(0.5);
        }
        @keyframes win-appear {
            to { opacity: 1; transform: scale(1); }
        }

        .win-title {
            font-size: 60px; font-weight: 900;
            background: linear-gradient(45deg, #ffd700, #ff6b6b, #ffd700);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 2s ease infinite;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.8);
            margin-bottom: 20px;
        }

        .win-energy {
            font-size: 40px; color: #4ecdc4;
            margin-bottom: 10px;
            animation: energy-glow 1s ease-in-out infinite alternate;
        }
        @keyframes energy-glow {
            from { text-shadow: 0 0 20px rgba(78, 205, 196, 0.5); }
            to { text-shadow: 0 0 40px rgba(78, 205, 196, 1); }
        }

        .win-rank {
            font-size: 28px; color: #ffd700;
            letter-spacing: 5px;
            margin-bottom: 40px;
            padding: 15px 40px;
            border: 2px solid #ffd700;
            border-radius: 50px;
            display: inline-block;
            background: rgba(255, 215, 0, 0.1);
        }

        .rewards-list {
            display: flex; flex-direction: column;
            gap: 15px; margin-bottom: 40px;
        }
        .reward-item {
            display: flex; align-items: center;
            gap: 15px; padding: 15px 25px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            border-left: 4px solid #ffd700;
            animation: slide-in 0.5s ease-out forwards;
            opacity: 0; transform: translateX(-50px);
        }
        .reward-item:nth-child(1) { animation-delay: 0.2s; }
        .reward-item:nth-child(2) { animation-delay: 0.4s; }
        .reward-item:nth-child(3) { animation-delay: 0.6s; }
        @keyframes slide-in {
            to { opacity: 1; transform: translateX(0); }
        }
        .reward-icon { font-size: 30px; }
        .reward-text { font-size: 18px; text-align: left; }
        .reward-text span { color: #ffd700; font-weight: bold; }

        .btn-claim {
            padding: 20px 50px; font-size: 20px;
            font-weight: bold; color: #000;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            border: none; border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.5);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .btn-claim:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(78, 205, 196, 0.7);
        }

        /* Вспышка */
        #flash {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff; z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }

        /* Конфетти */
        .confetti {
            position: fixed; width: 10px; height: 10px;
            pointer-events: none; z-index: 100;
            animation: confetti-fall 3s ease-out forwards;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Прогресс бар */
        .progress-container {
            width: 300px; height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px; margin-top: 30px;
            overflow: hidden; display: none;
        }
        .progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border-radius: 3px;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px #ffd700;
        }

        /* Текст загрузки */
        .loading-text {
            margin-top: 20px; font-size: 14px;
            letter-spacing: 3px; opacity: 0.7;
            animation: loading-pulse 1s ease-in-out infinite;
        }
        @keyframes loading-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="universe">
        <div class="planet planet-1"></div>
        <div class="planet planet-2"></div>
    </div>

    <div id="flash"></div>

    <!-- Сцена 1: Старт -->
    <div id="scene-start" class="scene">
        <h1 class="title">GALACTIC<br>GIFT</h1>
        <p class="subtitle">ТВОЙ КОСМИЧЕСКИЙ ПОДАРОК ЖДЕТ</p>
        <button class="btn-launch" onclick="launch()">🚀 ЗАПУСК</button>
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="loading-text" id="loading-text" style="display: none;">ИНИЦИАЛИЗАЦИЯ...</div>
    </div>

    <!-- Сцена 2: Полет -->
    <div id="scene-flight" class="scene hidden">
        <div id="star-target">
            <div class="star-rays"></div>
            <div class="star-glow"></div>
        </div>
        <div id="rocket-container">
            <div class="rocket" id="rocket">
                <div class="rocket-nose"></div>
                <div class="rocket-body"></div>
                <div class="rocket-window"></div>
                <div class="rocket-fin-left"></div>
                <div class="rocket-fin-right"></div>
                <div class="flame"></div>
                <div class="flame-inner"></div>
            </div>
        </div>
    </div>

    <!-- Сцена 3: Победа -->
    <div id="scene-win" class="scene hidden">
        <div class="win-container">
            <div class="win-title">ПОБЕДА!</div>
            <div class="win-energy">+5000</div>
            <div class="win-rank">SUPERNOVA</div>
            <div class="rewards-list">
                <div class="reward-item">
                    <div class="reward-icon">⚡</div>
                    <div class="reward-text">Энергия: <span>5000 кредитов</span></div>
                </div>
                <div class="reward-item">
                    <div class="reward-icon">👑</div>
                    <div class="reward-text">Ранг: <span>SUPERNOVA (30 дней)</span></div>
                </div>
                <div class="reward-item">
                    <div class="reward-icon">🎁</div>
                    <div class="reward-text">Бонус: <span>TikTok Shoutout</span></div>
                </div>
            </div>
            <button class="btn-claim" onclick="claimReward()">ЗАБРАТЬ НАГРАДУ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Get params from URL
        const urlParams = new URLSearchParams(window.location.search);
        const claimed = urlParams.get('claimed') === '1';
        
        if (claimed) {
            document.querySelector('.btn-launch').style.display = 'none';
            document.querySelector('.subtitle').innerText = "ВЫ УЖЕ ЗАБРАЛИ СВОЙ ПОДАРОК";
            document.querySelector('.subtitle').style.color = "#ff4444";
        }

        // Аудио контекст для звуков
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // Генерация звуков
        function playSound(type) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'launch') {
                // Звук запуска ракеты
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(100, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 2);
            } else if (type === 'explosion') {
                // Звук взрыва/победы
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'win') {
                // Победная мелодия
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C-E-G-C
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.15);
                    gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + i * 0.15 + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);
                    osc.start(audioCtx.currentTime + i * 0.15);
                    osc.stop(audioCtx.currentTime + i * 0.15 + 0.3);
                });
            }
        }

        // Создание звезд
        function createStars() {
            const universe = document.getElementById('universe');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                universe.appendChild(star);
            }
        }
        createStars();

        // Создание частиц огня
        function createSparks() {
            const rocket = document.getElementById('rocket-container');
            const rect = rocket.getBoundingClientRect();

            for (let i = 0; i < 5; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.left = rect.left + rect.width / 2 + 'px';
                spark.style.top = rect.bottom + 'px';
                spark.style.width = (Math.random() * 8 + 4) + 'px';
                spark.style.height = spark.style.width;
                spark.style.setProperty('--tx', (Math.random() * 100 - 50) + 'px');
                spark.style.setProperty('--ty', (Math.random() * 100 + 50) + 'px');
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 500);
            }
        }

        // Создание дыма
        function createSmoke() {
            const rocket = document.getElementById('rocket-container');
            const rect = rocket.getBoundingClientRect();

            const smoke = document.createElement('div');
            smoke.className = 'smoke';
            smoke.style.left = rect.left + rect.width / 2 - 30 + 'px';
            smoke.style.top = rect.bottom + 'px';
            smoke.style.width = '60px';
            smoke.style.height = '60px';
            document.body.appendChild(smoke);
            setTimeout(() => smoke.remove(), 2000);
        }

        // Создание конфетти
        function createConfetti() {
            const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#95e1d3', '#f38181', '#aa96da'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = (Math.random() * 10 + 5) + 'px';
                confetti.style.height = (Math.random() * 10 + 5) + 'px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }
        }

        // Запуск
        async function launch() {
            playSound('launch');
            tg.HapticFeedback.impactOccurred('heavy');

            // Показ прогресса
            document.querySelector('.btn-launch').style.display = 'none';
            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('loading-text').style.display = 'block';

            // Анимация прогресса
            const progressBar = document.getElementById('progress-bar');
            for (let i = 0; i <= 100; i++) {
                await new Promise(r => setTimeout(r, 20));
                progressBar.style.width = i + '%';
            }

            // Переключение сцен
            document.getElementById('scene-start').classList.add('hidden');
            document.getElementById('scene-flight').classList.remove('hidden');
            document.getElementById('star-target').style.display = 'block';

            // Запуск ракеты
            const rocket = document.getElementById('rocket-container');
            rocket.style.bottom = '-150px';

            // Интервал для частиц
            const sparkInterval = setInterval(createSparks, 50);
            const smokeInterval = setInterval(createSmoke, 100);

            setTimeout(() => {
                rocket.style.transition = 'transform 2.5s cubic-bezier(0.6, 0, 0.4, 1)';
                rocket.style.transform = 'translateX(-50%) translateY(-85vh) scale(0.4)';
            }, 100);

            // Взрыв и победа
            setTimeout(() => {
                clearInterval(sparkInterval);
                clearInterval(smokeInterval);

                playSound('explosion');

                // Вспышка
                const flash = document.getElementById('flash');
                flash.style.opacity = '1';
                flash.style.transition = 'opacity 0.5s';

                setTimeout(() => {
                    flash.style.opacity = '0';
                    document.getElementById('scene-flight').classList.add('hidden');
                    document.getElementById('scene-win').classList.remove('hidden');
                    playSound('win');
                    createConfetti();
                    tg.HapticFeedback.notificationOccurred('success');
                }, 300);
            }, 2400);
        }

        // Забрать награду
        function claimReward() {
            tg.sendData("REWARD_GALACTIC_2026");
            tg.close();
        }

        // Разблокировка аудио по клику (требование iOS)
        document.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: true });
    </script>
</body>
</html>
