<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VoyageAI GIFT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; font-family: 'Arial', sans-serif; color: #fff; }
        
        /* Звезды */
        #stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .scene { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hidden { display: none !important; }

        /* Кнопка запуска */
        .start-btn {
            padding: 25px 60px; font-size: 28px; font-weight: 900; color: #000; background: linear-gradient(45deg, #ffd700, #ff8c00);
            border: none; border-radius: 60px; cursor: pointer; box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            text-transform: uppercase; letter-spacing: 2px; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Ракета */
        #rocket {
            position: absolute; bottom: -150px; width: 100px; z-index: 15;
            filter: drop-shadow(0 0 20px #ff4500); display: none;
        }
        .rocket-fly { display: block !important; animation: launch 2s cubic-bezier(0.6, 0, 0.4, 1) forwards; }
        @keyframes launch {
            0% { bottom: -150px; transform: scale(1.5); }
            100% { bottom: 60%; transform: scale(0.3); }
        }

        /* Цель - Звезда */
        #big-star {
            width: 200px; height: 200px; background: radial-gradient(circle, #fff, #ffd700, transparent);
            border-radius: 50%; box-shadow: 0 0 100px #ffd700; position: absolute; top: 15%;
            animation: glow 2s infinite alternate; display: none;
        }
        @keyframes glow { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.2); opacity: 1; } }

        /* Приз */
        .prize-text { font-size: 50px; font-weight: 900; color: #ffd700; text-shadow: 0 0 30px #ff8c00; margin-bottom: 20px; }
        .prize-sub { font-size: 24px; color: #fff; opacity: 0.8; }
        .claim-btn { margin-top: 40px; padding: 15px 40px; background: #fff; color: #000; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }

    </style>
</head>
<body>
    <canvas id="stars"></canvas>

    <div id="scene-1" class="scene">
        <h1 style="font-size: 40px; margin-bottom: 50px;">ТВОЙ ПОДАРОК 🎁</h1>
        <button class="start-btn" onclick="start()">ЗАПУСК РАКЕТЫ</button>
    </div>

    <div id="scene-2" class="scene hidden">
        <div id="big-star"></div>
        <img id="rocket" src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png" alt="rocket">
    </div>

    <div id="scene-3" class="scene hidden">
        <div class="prize-text">+1500 ЭНЕРГИИ</div>
        <div class="prize-sub">РАНГ NEBULA АКТИВИРОВАН</div>
        <button class="claim-btn" onclick="claim()">ЗАБРАТЬ ПРИЗ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let w, h, stars = [];

        function initStars() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<200; i++) stars.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*2, s:Math.random()*0.5});
        }
        function drawStars() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                s.y += s.s; if(s.y > h) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }
        initStars(); drawStars();

        function start() {
            document.getElementById('scene-1').classList.add('hidden');
            document.getElementById('scene-2').classList.remove('hidden');
            document.getElementById('big-star').style.display = 'block';
            document.getElementById('rocket').classList.add('rocket-fly');
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                // Эффект взрыва (просто белая вспышка для яркости)
                document.body.style.background = '#fff';
                tg.HapticFeedback.notificationOccurred('success');
                setTimeout(() => {
                    document.body.style.background = '#000';
                    document.getElementById('scene-2').classList.add('hidden');
                    document.getElementById('scene-3').classList.remove('hidden');
                }, 100);
            }, 1900);
        }

        function claim() {
            tg.sendData("REWARD_GALACTIC_2026");
            tg.close();
        }
    </script>
</body>
</html>
